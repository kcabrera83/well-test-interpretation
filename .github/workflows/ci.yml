name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Train models
        run: python train.py
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py train.py --max-line-length=120
